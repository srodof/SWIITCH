<!-- @dsCard group="Marketing Site" viewport="1280x900" name="Home / Contacto / Marketing Digital" subtitle="Interactive click-through recreation of swiitchad.com" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><title>SWIITCH — Marketing Site UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="./HomePage.jsx"></script>
<script type="text/babel" src="./ContactoPage.jsx"></script>
<script type="text/babel" src="./MarketingDigitalPage.jsx"></script>
<script type="text/babel">
const { WhatsAppButton } = window.SWIITCHDesignSystem_2be436;
function App(){
  const [page, setPage] = React.useState('home');
  const tabs = [['home','Home'],['contacto','Contacto'],['marketing','Marketing Digital']];
  return (
    <div style={{position:'relative'}}>
      <div style={{position:'fixed',top:0,left:0,right:0,zIndex:50,display:'flex',gap:0,background:'#111',fontFamily:'var(--font-body-family)'}}>
        {tabs.map(([id,label]) => (
          <button key={id} onClick={() => setPage(id)} style={{
            flex:'none',padding:'8px 18px',border:'none',cursor:'pointer',fontSize:12,fontWeight:700,
            background: page===id ? 'var(--color-primary)' : 'transparent', color:'#fff'
          }}>{label}</button>
        ))}
      </div>
      <div style={{paddingTop:34}}>
        {page==='home' && <HomePage onNavigate={setPage}/>}
        {page==='contacto' && <ContactoPage/>}
        {page==='marketing' && <MarketingDigitalPage/>}
      </div>
      <div style={{position:'fixed',bottom:24,right:24,zIndex:50}}><WhatsAppButton/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>

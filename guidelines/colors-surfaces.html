<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces" subtitle="Three flat surfaces carry all depth" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:20px;background:#fff;font-family:'Montserrat',sans-serif">
<div style="display:flex;flex-direction:column;gap:6px"><div style="height:64px;border-radius:6px;background:var(--color-surface);border:1px solid #eee"></div><div style="font:600 12px/1.3 'Montserrat',sans-serif;color:#333">Surface</div><div style="font:400 11px/1.3 monospace;color:#797979">--color-surface</div></div>
<div style="display:flex;flex-direction:column;gap:6px"><div style="height:64px;border-radius:6px;background:var(--color-surface-alt);"></div><div style="font:600 12px/1.3 'Montserrat',sans-serif;color:#333">Surface Alt (pearl)</div><div style="font:400 11px/1.3 monospace;color:#797979">--color-surface-alt</div></div>
<div style="display:flex;flex-direction:column;gap:6px"><div style="height:64px;border-radius:6px;background:var(--color-surface-footer);"></div><div style="font:600 12px/1.3 'Montserrat',sans-serif;color:#333">Surface Footer</div><div style="font:400 11px/1.3 monospace;color:#797979">--color-surface-footer</div></div>
</div>

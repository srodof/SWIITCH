<!-- @dsCard group="Colors" viewport="700x180" name="Brand Red" subtitle="Single accent color, all interactive states derive from it" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:20px;background:#fff;font-family:'Montserrat',sans-serif">
<div style="display:flex;flex-direction:column;gap:6px"><div style="height:64px;border-radius:6px;background:var(--color-primary);"></div><div style="font:600 12px/1.3 'Montserrat',sans-serif;color:#333">Primary (default)</div><div style="font:400 11px/1.3 monospace;color:#797979">--color-primary</div></div>
<div style="display:flex;flex-direction:column;gap:6px"><div style="height:64px;border-radius:6px;background:var(--color-primary-hover);"></div><div style="font:600 12px/1.3 'Montserrat',sans-serif;color:#333">Hover (~90% darken)</div><div style="font:400 11px/1.3 monospace;color:#797979">--color-primary-hover</div></div>
<div style="display:flex;flex-direction:column;gap:6px"><div style="height:64px;border-radius:6px;background:var(--color-primary-active);"></div><div style="font:600 12px/1.3 'Montserrat',sans-serif;color:#333">Active (~80% darken)</div><div style="font:400 11px/1.3 monospace;color:#797979">--color-primary-active</div></div>
</div>

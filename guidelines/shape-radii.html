<!-- @dsCard group="Shape" viewport="700x180" name="Corner Radius Scale" subtitle="Minimal, purposeful — 0 for photo tiles, full circle for portraits" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;padding:24px;background:#fff;font-family:'Montserrat',sans-serif">
<div style="display:flex;flex-direction:column;gap:6px;align-items:center"><div style="width:56px;height:56px;background:var(--color-primary);border-radius:var(--radius-none)"></div><span style="font-size:11px;color:#797979">none 0</span></div>
<div style="display:flex;flex-direction:column;gap:6px;align-items:center"><div style="width:56px;height:56px;background:var(--color-primary);border-radius:var(--radius-xs)"></div><span style="font-size:11px;color:#797979">xs 3</span></div>
<div style="display:flex;flex-direction:column;gap:6px;align-items:center"><div style="width:56px;height:56px;background:var(--color-primary);border-radius:var(--radius-sm)"></div><span style="font-size:11px;color:#797979">sm 5</span></div>
<div style="display:flex;flex-direction:column;gap:6px;align-items:center"><div style="width:56px;height:56px;background:var(--color-primary);border-radius:50%"></div><span style="font-size:11px;color:#797979">circle</span></div>
<div style="display:flex;flex-direction:column;gap:6px;align-items:center"><div style="width:56px;height:56px;background:var(--color-primary);border-radius:var(--radius-full)"></div><span style="font-size:11px;color:#797979">full</span></div>
</div>
